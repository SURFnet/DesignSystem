name: Bug report
description: Report a problem with a component, token, or the build
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options:
        - "@surfnet/curve-react"
        - "@surfnet/curve-angular"
        - "@surfnet/curve-tokens"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. @surfnet/curve-react@1.4.0
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: Browser, OS, Node version, framework version, etc.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, Storybook links, stack traces, etc.
    validations:
      required: false
