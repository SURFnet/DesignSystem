name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the pnpm version pinned in package.json -> packageManager.
      - uses: pnpm/action-setup@v4

      # Caches the pnpm store keyed on the lockfile, so installs are near-instant
      # when dependencies haven't changed.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Caches Turborepo task outputs, so unchanged build/lint tasks are replayed
      # from cache instead of re-running.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm build
