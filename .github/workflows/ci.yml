name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel a still-running CI run for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Uses the pnpm version pinned in package.json -> packageManager.
      - uses: pnpm/action-setup@v4

      # Caches the pnpm store keyed on the lockfile, so installs are near-instant
      # when dependencies haven't changed.
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Caches Turborepo task outputs, so unchanged build/lint tasks are replayed
      # from cache instead of re-running.
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - run: pnpm format:check

      - run: pnpm lint

      - run: pnpm build

      # Automated WCAG 2.1 AA sweep of every Storybook story (all themes/modes),
      # via @storybook/test-runner + axe. Reports cover ~30-50% of WCAG; the
      # residual manual checklist lives in docs/accessibility/.
      - name: Install Playwright Chromium
        run: pnpm --filter @surfnet/react exec playwright install --with-deps chromium

      # Report-only for now: surfaces violations without blocking PRs while the
      # backlog is triaged. Flip to blocking by removing `continue-on-error`
      # once findings are at zero.
      - name: Accessibility audit (WCAG 2.1 AA)
        continue-on-error: true
        run: pnpm test:a11y

      - name: Upload a11y reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-reports
          path: packages/*/a11y-report/**
          if-no-files-found: ignore
