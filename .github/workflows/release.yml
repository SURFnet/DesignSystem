name: Release

# When changesets land on main, this either opens/updates a "Version Packages"
# PR (collecting pending changesets into version bumps + changelogs) or, once
# that PR is merged, builds and publishes the changed packages to npm.
on:
  push:
    branches: [main]

# Avoid two release runs racing on the same branch.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # create the version PR / push tags
  pull-requests: write # open and update the version PR
  id-token: write # OIDC token for npm trusted publishing (+ automatic provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      # Trusted publishing (OIDC) needs npm >= 11.5.1; Node 22 ships npm 10.x.
      # `changeset publish` shells out to this global npm to publish each package.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          # Opens/updates the "Version Packages" PR.
          version: pnpm version-packages
          # Runs once the version PR is merged: builds, then `changeset publish`.
          # Must be a single command (no shell operators) — changesets/action execs
          # this string directly without a shell, so `&&` chaining has to live
          # inside the `release` script itself, not here.
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          # No NPM_TOKEN: auth is handled by npm trusted publishing via the OIDC
          # id-token above, and provenance is generated automatically.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
