name: Release

# When changesets land on main, this either opens/updates a "Version Packages"
# PR (collecting pending changesets into version bumps + changelogs) or, once
# that PR is merged, builds and publishes the changed packages to npm.
on:
  push:
    branches: [main]

# Avoid two release runs racing on the same branch.
concurrency: release-${{ github.ref }}

permissions:
  contents: write # create the version PR / push tags
  pull-requests: write # open and update the version PR
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create version PR or publish
        uses: changesets/action@v1
        with:
          # Opens/updates the "Version Packages" PR.
          version: pnpm version-packages
          # Runs once the version PR is merged: builds, then `changeset publish`.
          publish: pnpm build && pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
