<button
  hlmBtn
  variant="outline"
  size="icon"
  class="fixed bottom-6 right-6 z-50 size-11 rounded-full shadow-lg"
  aria-label="Change theme"
  [hlmDropdownMenuTrigger]="themeMenu"
  side="top"
  align="end"
>
  <ng-icon name="phosphorPalette" />
</button>

<ng-template #themeMenu>
  <hlm-dropdown-menu class="max-h-[28rem] w-56 overflow-y-auto">
    <hlm-dropdown-menu-label>Mode</hlm-dropdown-menu-label>
    <hlm-dropdown-menu-group>
      <button hlmDropdownMenuRadio [checked]="mode() === 'light'" (triggered)="setMode('light')">
        <ng-icon name="phosphorSun" />
        <span>Light</span>
        <hlm-dropdown-menu-radio-indicator />
      </button>
      <button hlmDropdownMenuRadio [checked]="mode() === 'dark'" (triggered)="setMode('dark')">
        <ng-icon name="phosphorMoon" />
        <span>Dark</span>
        <hlm-dropdown-menu-radio-indicator />
      </button>
    </hlm-dropdown-menu-group>

    <hlm-dropdown-menu-separator />

    <hlm-dropdown-menu-label>Theme</hlm-dropdown-menu-label>
    <hlm-dropdown-menu-group>
      @for (name of themeNames; track name) {
        <button hlmDropdownMenuRadio [checked]="theme() === name" (triggered)="setTheme(name)">
          <span>{{ titleCase(name) }}</span>
          <hlm-dropdown-menu-radio-indicator />
        </button>
      }
    </hlm-dropdown-menu-group>
  </hlm-dropdown-menu>
</ng-template>
