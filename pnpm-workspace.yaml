packages:
  - "packages/*"

# Supply-chain hardening (requires pnpm 10+/11).

# Don't install versions younger than this many minutes (1440 = 1 day).
minimumReleaseAge: 1440

# Trusted packages exempt from the cooldown (frequent alpha releases).
minimumReleaseAgeExclude:
  - "@spartan-ng/brain"
  - "@spartan-ng/cli"

# Transitive deps must come from the registry, not git/tarball URLs.
blockExoticSubdeps: true

# Only these packages may run install scripts; everything else is blocked.
allowBuilds:
  esbuild: true
  "@parcel/watcher": true
  nx: false
  lmdb: false
  msgpackr-extract: false
  less: false
